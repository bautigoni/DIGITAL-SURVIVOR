# nginx para Digital Survivor (front estático)
# Sirve SPA + proxea /api/* al backend.

upstream ds_api {
    server api:4000;
}

server {
    listen 80;
    server_name _;

    # Logs compactos
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Front estático
    root /usr/share/nginx/html;
    index index.html;

    # Healthcheck interno
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Cache de assets versionados (Vite emite /assets/* con hash)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy a la API
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # timeouts generosos para IA procedural pesada
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        proxy_pass http://ds_api;
    }

    # SPA fallback a index.html (history mode de React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Compresión
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml font/ttf font/otf image/svg+xml;
}
